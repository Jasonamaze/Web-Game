<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 確保在手機上呈現正確的比例，不被輕易縮放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- iOS 加入主畫面 (PWA) 專屬設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes"> <!-- 允許全螢幕執行 (隱藏 Safari 網址列) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> <!-- 頂部狀態列樣式 -->
    <meta name="apple-mobile-web-app-title" content="我的遊戲"> <!-- 儲存到桌面時的預設 App 名稱 -->
    <link rel="apple-touch-icon" href="icon.png"> <!-- 桌面小圖示的路徑 -->
    
    <!-- 一般瀏覽器標籤圖示 -->
    <link rel="icon" type="image/png" href="icon.png">

    <title>我的網頁遊戲合集</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none; /* 禁用長按反白，讓體驗更像 App */
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 36px;
            color: #2c3e50;
            margin-bottom: 10px;
            text-align: center;
        }

        p.subtitle {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 40px;
            text-align: center;
        }

        /* 遊戲列表網格配置 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        /* 遊戲卡片樣式 */
        .game-card {
            background-color: white;
            border-radius: 16px;
            padding: 30px 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            /* 給所有遊戲統一的漸層質感，看起來都像已完成的特選遊戲 */
            background: linear-gradient(to bottom right, #ffffff, #fdfdfd);
        }

        /* 滑鼠/觸控移上去的特效 */
        .game-card:hover, .game-card:active {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.1);
            border-color: #3498db;
        }

        .game-icon {
            font-size: 60px;
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .game-card:hover .game-icon, .game-card:active .game-icon {
            transform: scale(1.1);
        }

        .game-title {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin: 0 0 10px 0;
        }

        .game-desc {
            font-size: 14px;
            color: #95a5a6;
            margin: 0;
            line-height: 1.5;
        }

    </style>
</head>
<body>

    <h1>🎮 網頁遊戲合集</h1>
    <p class="subtitle">點擊下方卡片，立刻開始遊玩！</p>

    <div class="game-grid">
        <!-- 遊戲 1 -->
        <a href="flappy-gemini.html" class="game-card">
            <div class="game-icon">🐦</div>
            <h2 class="game-title">小鳥避牆-Gemini版</h2>
            <p class="game-desc">包含5階動態難度與多種重力選擇，挑戰你的反應極限！</p>
        </a>

        <!-- 遊戲 2 -->
        <a href="flappy-chatgpt.html" class="game-card">
            <div class="game-icon">🐥</div>
            <h2 class="game-title">小鳥避牆-ChatGPT版</h2>
            <p class="game-desc">另一種風格的避牆挑戰，來體驗看看不同手感的差異吧。</p>
        </a>

        <!-- 遊戲 3 -->
        <a href="game3.html" class="game-card">
            <div class="game-icon">🎈</div>
            <h2 class="game-title">鳥頭打氣球</h2>
            <p class="game-desc">從底部發射鳥頭！10關挑戰，引爆黑色炸彈產生連鎖反應。</p>
        </a>

        <!-- 遊戲 4 -->
        <a href="game4.html" class="game-card">
            <div class="game-icon">🐍</div>
            <h2 class="game-title">貪吃蛇 - 奇幻森林</h2>
            <p class="game-desc">吃蘋果變長，小心魔法藥水！支援滑動與十字鍵操作。</p>
        </a>

        <!-- 遊戲 5 -->
        <a href="game5.html" class="game-card">
            <div class="game-icon">🧩</div>
            <h2 class="game-title">2048 - 霓虹流光</h2>
            <p class="game-desc">滑動合併方塊拼出 2048！卡關時隨時呼叫 AI 智能提示。</p>
        </a>

        <!-- 遊戲 6 -->
        <a href="game6.html" class="game-card">
            <div class="game-icon">👾</div>
            <h2 class="game-title">太空侵略者</h2>
            <p class="game-desc">動態星空背景，駕駛戰機消滅不斷進逼的外星大軍！</p>
        </a>
    </div>

</body>
</html>
